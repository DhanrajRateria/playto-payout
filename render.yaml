databases:
  - name: playto-postgres
    databaseName: playto_payout
    user: playto
    plan: free

services:
  - type: web
    name: playto-backend
    plan: free
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && gunicorn config.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /admin/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playto-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: REDIS_URL
        fromService:
          name: playto-redis
          type: redis
          property: connectionString

  - type: worker
    name: playto-celery
    plan: free
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config worker --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playto-postgres
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: REDIS_URL
        fromService:
          name: playto-redis
          type: redis
          property: connectionString

  - type: worker
    name: playto-beat
    plan: free
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config beat --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playto-postgres
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: REDIS_URL
        fromService:
          name: playto-redis
          type: redis
          property: connectionString

  - type: redis
    name: playto-redis
    plan: free
    maxmemoryPolicy: noeviction
