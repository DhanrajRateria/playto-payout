[build]
builder = "nixpacks"

[deploy]
startCommand = "cd backend && python manage.py migrate --noinput && python seed.py && gunicorn config.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
healthcheckPath = "/admin/"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3